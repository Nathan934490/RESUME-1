<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Professional Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root { --bg-color: #0f172a; --card-bg: #1e293b; --text-color: #cbd5e1; --accent-color: #38bdf8; --heading-color: #ffffff; --border-color: #334155; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; padding-bottom: 3rem; }
        nav { background: var(--card-bg); border-bottom: 1px solid var(--border-color); padding: 1rem; }
        .nav-container { max-width: 850px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { color: var(--heading-color); font-weight: 700; text-decoration: none; font-size: 1.2rem; }
        .nav-links { display: flex; gap: 1.5rem; list-style: none; }
        .nav-links a { color: var(--text-color); text-decoration: none; font-weight: 500; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent-color); }
        .container { max-width: 550px; margin: 2rem auto; padding: 0 1rem; }
        section { background: var(--card-bg); padding: 2rem; border-radius: 16px; border: 1px solid var(--border-color); }
        h2 { color: var(--heading-color); margin-bottom: 1.5rem; border-bottom: 2px solid var(--border-color); padding-bottom: 0.5rem; }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; color: var(--heading-color); margin-bottom: 0.5rem; font-size: 0.9rem; }
        input, textarea { width: 100%; padding: 0.75rem; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 8px; color: #fff; }
        input:focus, textarea:focus { border-color: var(--accent-color); outline: none; }
        button { background: var(--accent-color); color: var(--bg-color); width: 100%; padding: 0.75rem; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">Portfolio.inc</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="experience.html">Experience</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <section>
            <h2>Get In Touch</h2>
            <form action="#" onsubmit="alert('Message Sent (Simulation)!'); return false;">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="name@domain.com" required>
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea rows="5" placeholder="Let's collaborate..." required></textarea>
                </div>
                <button type="submit">Send Message</button>
            </form>
        </section>
    </div>

</body>
</html>
